<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Serca Fusion Calculator</title>
  <style>
    body { font-family: Arial; padding: 20px; background:#0f172a; color:#e2e8f0 }
    input { margin:5px; padding:5px }
    button { padding:10px; margin-top:10px }
    .box { background:#1e293b; padding:15px; border-radius:10px; margin-bottom:15px }
  </style>
</head>
<body>

<h2>Serca Fusion Material Optimizer</h2>

<div class="box">
  <h3>Inputs</h3>
  Gold Balance: <input id="gold" type="number"><br>
  Gold To Keep: <input id="keep" type="number"><br><br>

  Cost per 100 Timber: <input id="c_timber" type="number"><br>
  Cost per 100 Tender Timber: <input id="c_tender" type="number"><br>
  Cost per 100 Sturdy Timber: <input id="c_sturdy" type="number"><br>
  Cost per 100 Abidos Timber: <input id="c_abidos" type="number"><br>
</div>

<button onclick="calculate()">Calculate</button>

<div class="box" id="output"></div>

<script>

const RECIPE = {
  timber: 112/10,
  tender: 59/10,
  abidos: 43/10,
  gold: 462/10
};

function calculate(){
  const gold = +document.getElementById('gold').value;
  const keep = +document.getElementById('keep').value;

  const costs = {
    timber: +document.getElementById('c_timber').value/100,
    tender: +document.getElementById('c_tender').value/100,
    sturdy: +document.getElementById('c_sturdy').value/100,
    abidos: +document.getElementById('c_abidos').value/100
  };

  const budget = gold - keep;

  let best = { crafts:0 };

  // brute force search within reasonable bounds
  for(let t=0;t<=budget/costs.timber;t++){
    for(let td=0;td<=budget/costs.tender;td++){
      for(let s=0;s<=budget/costs.sturdy;s++){
        for(let a=0;a<=budget/costs.abidos;a++){

          const spend = t*costs.timber + td*costs.tender + s*costs.sturdy + a*costs.abidos;
          if(spend > budget) continue;

          let timber = t;
          let tender = td;
          let sturdy = s;
          let abidos = a;

          // conversions
          timber += Math.floor(tender/25)*50;
          timber += Math.floor(sturdy/5)*50;

          let crafts = Math.min(
            timber/RECIPE.timber,
            tender/RECIPE.tender,
            abidos/RECIPE.abidos
          );

          if(crafts > best.crafts){
            best = { crafts, t, td, s, a, spend };
          }
        }
      }
    }
  }

  document.getElementById('output').innerHTML = `
    Crafts: ${Math.floor(best.crafts)}<br>
    Timber: ${best.t}<br>
    Tender Timber: ${best.td}<br>
    Sturdy Timber: ${best.s}<br>
    Abidos Timber: ${best.a}<br>
    Gold Spent: ${best.spend.toFixed(2)}
  `;
}

</script>

</body>
</html>
