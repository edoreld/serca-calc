<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serca Fusion Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8">
    <div class="mx-auto max-w-4xl bg-slate-800 rounded-xl shadow-2xl border border-slate-700 p-6">
        <h1 class="text-3xl font-bold mb-6 text-blue-400 border-b border-slate-700 pb-4">Serca Fusion Optimizer</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <section class="space-y-4">
                <h2 class="text-xl font-semibold text-slate-300">Market Prices (per 100 stack)</h2>
                <div class="grid grid-cols-1 gap-3">
                    <div>
                        <label class="block text-sm font-medium mb-1">Timber (100x)</label>
                        <input type="number" id="p-timber" value="180" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Tender Timber (100x)</label>
                        <input type="number" id="p-tender" value="358" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Sturdy Timber (100x)</label>
                        <input type="number" id="p-sturdy" value="1686" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Abidos Timber (100x)</label>
                        <input type="number" id="p-abidos" value="2198" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 outline-none focus:border-blue-500">
                    </div>
                </div>

                <h2 class="text-xl font-semibold text-slate-300 mt-6">Target Goal</h2>
                <div>
                    <label class="block text-sm font-medium mb-1">How many Serca Fusion Materials to craft?</label>
                    <input type="number" id="target-serca" value="1000" step="10" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 outline-none focus:border-blue-500">
                </div>
                
                <button onclick="calculate()" class="w-full bg-blue-600 hover:bg-blue-500 transition-colors py-3 rounded-lg font-bold text-lg mt-4">
                    Optimize Purchase List
                </button>
            </section>

            <section id="results" class="bg-slate-900/50 rounded-lg p-6 border border-slate-700 hidden">
                <h2 class="text-xl font-semibold text-green-400 mb-4">Optimal Purchase Strategy</h2>
                <div class="space-y-4">
                    <div id="shopping-summary" class="space-y-3">
                        </div>
                    
                    <hr class="border-slate-700">
                    
                    <div class="p-3 bg-blue-900/20 rounded border border-blue-800/50">
                        <h3 class="text-sm font-bold text-blue-300 uppercase tracking-wider mb-2">Required Trades</h3>
                        <ul id="trade-instructions" class="text-xs space-y-1 text-slate-300 list-disc list-inside"></ul>
                    </div>

                    <div class="pt-4">
                        <p class="text-sm text-slate-400">Total Material Cost:</p>
                        <div id="total-cost" class="text-2xl font-mono text-yellow-500 font-bold">0g</div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        function calculate() {
            const target = parseInt(document.getElementById('target-serca').value);
            const batches = Math.ceil(target / 10);
            
            // Raw AH Unit Prices
            const ah = {
                timber: parseFloat(document.getElementById('p-timber').value) / 100,
                tender: parseFloat(document.getElementById('p-tender').value) / 100,
                sturdy: parseFloat(document.getElementById('p-sturdy').value) / 100,
                abidos: parseFloat(document.getElementById('p-abidos').value) / 100
            };

            // Recipe Requirements
            const req = {
                timber: 112 * batches,
                tender: 59 * batches,
                abidos: 43 * batches
            };

            // Calculate Effective Prices via Conversions
            // Timber can be made from Tender (25->50) or Sturdy (5->50)
            const effTimber = Math.min(ah.timber, ah.tender * 25/50, ah.sturdy * 5/50);
            
            // Powder is a proxy. 100 Powder = 50 Tender | 10 Sturdy | 10 Abidos
            // 100 Powder cost = min(100 Timber * 1.25, 50 Tender * 2) <- corrected ratios
            const powderCost = Math.min(ah.timber * (100/80), ah.tender * (50/80));
            
            const effTender = Math.min(ah.tender, powderCost * (100/50));
            const effAbidos = Math.min(ah.abidos, powderCost * (100/10));

            // Determine if trading is actually better
            const useTradeForTimber = effTimber < ah.timber;
            const useTradeForTender = effTender < ah.tender;
            const useTradeForAbidos = effAbidos < ah.abidos;

            // Compute Shopping List
            let shop = { timber: 0, tender: 0, sturdy: 0, abidos: 0 };
            let trades = [];

            // Resolve Abidos
            if (useTradeForAbidos) {
                const powderNeeded = (req.abidos / 10) * 100;
                // Powder comes from Timber or Tender?
                if (ah.timber * (100/80) < ah.tender * (50/80)) {
                    shop.timber += (powderNeeded / 80) * 100;
                    trades.push(`Convert Timber to ${powderNeeded} Logging Powder, then to Abidos`);
                } else {
                    shop.tender += (powderNeeded / 80) * 50;
                    trades.push(`Convert Tender to ${powderNeeded} Logging Powder, then to Abidos`);
                }
            } else {
                shop.abidos += req.abidos;
            }

            // Resolve Tender
            if (useTradeForTender) {
                const powderNeeded = (req.tender / 50) * 100;
                shop.timber += (powderNeeded / 80) * 100;
                trades.push(`Convert Timber to ${powderNeeded} Logging Powder, then to Tender`);
            } else {
                shop.tender += req.tender;
            }

            // Resolve Timber
            if (useTradeForTimber) {
                if (ah.tender * 25/50 < ah.sturdy * 5/50) {
                    shop.tender += (req.timber / 50) * 25;
                    trades.push(`Convert Tender Timber directly to Timber`);
                } else {
                    shop.sturdy += (req.timber / 50) * 5;
                    trades.push(`Convert Sturdy Timber directly to Timber`);
                }
            } else {
                shop.timber += req.timber;
            }

            // UI Display
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('total-cost').innerText = (
                (Math.ceil(shop.timber/100)*ah.timber*100) + 
                (Math.ceil(shop.tender/100)*ah.tender*100) + 
                (Math.ceil(shop.sturdy/100)*ah.sturdy*100) + 
                (Math.ceil(shop.abidos/100)*ah.abidos*100)
            ).toLocaleString() + "g";

            document.getElementById('shopping-summary').innerHTML = `
                <div class="flex justify-between border-b border-slate-700 pb-1"><span>Timber Stacks:</span> <span class="font-mono text-blue-300">${Math.ceil(shop.timber/100)}</span></div>
                <div class="flex justify-between border-b border-slate-700 pb-1"><span>Tender Timber Stacks:</span> <span class="font-mono text-blue-300">${Math.ceil(shop.tender/100)}</span></div>
                <div class="flex justify-between border-b border-slate-700 pb-1"><span>Sturdy Timber Stacks:</span> <span class="font-mono text-blue-300">${Math.ceil(shop.sturdy/100)}</span></div>
                <div class="flex justify-between border-b border-slate-700 pb-1"><span>Abidos Timber Stacks:</span> <span class="font-mono text-blue-300">${Math.ceil(shop.abidos/100)}</span></div>
            `;

            const tradeList = document.getElementById('trade-instructions');
            tradeList.innerHTML = trades.length > 0 ? trades.map(t => `<li>${t}</li>`).join('') : "<li>No trades needed; buy directly.</li>";
        }
    </script>
</body>
</html>
