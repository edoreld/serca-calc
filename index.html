<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serca Fusion Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8">
    <div class="max-auto max-w-4xl bg-slate-800 rounded-xl shadow-2xl border border-slate-700 p-6">
        <h1 class="text-3xl font-bold mb-6 text-blue-400 border-b border-slate-700 pb-4">Serca Fusion Optimizer</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <section class="space-y-4">
                <h2 class="text-xl font-semibold text-slate-300">Market Prices (per 100 stack)</h2>
                <div class="grid grid-cols-1 gap-3">
                    <div>
                        <label class="block text-sm font-medium mb-1">Timber Cost (100x)</label>
                        <input type="number" id="price-timber" value="10" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Tender Timber Cost (100x)</label>
                        <input type="number" id="price-tender" value="25" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Sturdy Timber Cost (100x)</label>
                        <input type="number" id="price-sturdy" value="50" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Abidos Timber Cost (100x)</label>
                        <input type="number" id="price-abidos" value="100" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 outline-none focus:border-blue-500">
                    </div>
                </div>

                <h2 class="text-xl font-semibold text-slate-300 mt-6">Wallet Settings</h2>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium mb-1">Gold Balance</label>
                        <input type="number" id="gold-balance" value="5000" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Gold To Keep</label>
                        <input type="number" id="gold-keep" value="500" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 outline-none focus:border-blue-500">
                    </div>
                </div>
                
                <button onclick="calculate()" class="w-full bg-blue-600 hover:bg-blue-500 transition-colors py-3 rounded-lg font-bold text-lg mt-4">
                    Calculate Max Craft
                </button>
            </section>

            <section id="results" class="bg-slate-900/50 rounded-lg p-6 border border-slate-700 hidden">
                <h2 class="text-xl font-semibold text-blue-300 mb-4">Optimal Strategy</h2>
                <div class="space-y-4">
                    <div class="text-4xl font-bold text-green-400" id="res-total-crafts">0</div>
                    <p class="text-sm text-slate-400">Total Serca Fusion Materials</p>
                    
                    <hr class="border-slate-700">
                    
                    <h3 class="font-medium text-slate-300">Purchase List (Stacks of 100):</h3>
                    <ul id="res-shopping-list" class="list-disc list-inside text-slate-200"></ul>
                    
                    <h3 class="font-medium text-slate-300 mt-4">Remaining Gold:</h3>
                    <div id="res-remaining-gold" class="text-lg font-mono text-yellow-500">0g</div>
                </div>
            </section>
        </div>
    </div>

    <script>
        function calculate() {
            // 1. Get Inputs
            const prices = {
                timber: parseFloat(document.getElementById('price-timber').value) / 100,
                tender: parseFloat(document.getElementById('price-tender').value) / 100,
                sturdy: parseFloat(document.getElementById('price-sturdy').value) / 100,
                abidos: parseFloat(document.getElementById('price-abidos').value) / 100
            };
            const goldTotal = parseFloat(document.getElementById('gold-balance').value);
            const goldKeep = parseFloat(document.getElementById('gold-keep').value);
            const budget = goldTotal - goldKeep;

            if (budget < 0) {
                alert("Gold to keep exceeds current balance!");
                return;
            }

            // 2. Material Conversion Logic (Find Cheapest Way to get 1 unit)
            // We use basic comparison for the conversion paths provided
            let cost = { ...prices };
            
            // Powder is a middle-man. 1 Powder = 1/100 Timber cost? No, 100 Timber = 80 Powder.
            // Let's iterate a few times to find the "market equilibrium" of your trades
            for(let i=0; i<5; i++) {
                let powderCost = Math.min(cost.timber * (100/80), cost.tender * (50/80));
                
                cost.timber = Math.min(cost.timber, cost.tender * (25/50), cost.sturdy * (5/50));
                cost.tender = Math.min(cost.tender, powderCost * (100/50));
                cost.abidos = Math.min(cost.abidos, powderCost * (100/10));
                // Note: sturdy can't be crafted from others based on your list, only used to make timber
            }

            // 3. Crafting Requirement per 10x Serca
            // 43 Abidos, 59 Tender, 112 Timber + 462g
            const costPerTen = (43 * cost.abidos) + (59 * cost.tender) + (112 * cost.timber) + 462;
            
            const totalBatches = Math.floor(budget / costPerTen);
            const totalSerca = totalBatches * 10;

            if (totalBatches <= 0) {
                alert("Not enough gold to craft even 10 Serca Fusion Materials.");
                return;
            }

            // 4. Calculate Shopping List
            // We buy the cheapest base material to fulfill requirements
            const buyAbidos = Math.ceil((totalBatches * 43) / 100);
            const buyTender = Math.ceil((totalBatches * 59) / 100);
            const buyTimber = Math.ceil((totalBatches * 112) / 100);
            const actualSpent = (buyAbidos * prices.abidos * 100) + 
                               (buyTender * prices.tender * 100) + 
                               (buyTimber * prices.timber * 100) + 
                               (totalBatches * 462);

            // Display
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('res-total-crafts').innerText = totalSerca.toLocaleString();
            document.getElementById('res-remaining-gold').innerText = (goldTotal - actualSpent).toFixed(2) + "g";
            
            const list = document.getElementById('res-shopping-list');
            list.innerHTML = `
                <li><strong>${buyTimber}x</strong> Timber Stacks (100)</li>
                <li><strong>${buyTender}x</strong> Tender Timber Stacks (100)</li>
                <li><strong>0x</strong> Sturdy Timber Stacks (Direct purchase rarely optimal)</li>
                <li><strong>${buyAbidos}x</strong> Abidos Timber Stacks (100)</li>
            `;
        }
    </script>
</body>
</html>
