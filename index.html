<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serca Fusion Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8">
    <div class="mx-auto max-w-4xl bg-slate-800 rounded-xl shadow-2xl border border-slate-700 p-6">
        <h1 class="text-3xl font-bold mb-6 text-blue-400 border-b border-slate-700 pb-4">Serca Fusion Optimizer</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <section class="space-y-4">
                <h2 class="text-xl font-semibold text-slate-300">Market Prices (per 100 stack)</h2>
                <div class="grid grid-cols-1 gap-3">
                    <div>
                        <label class="block text-sm font-medium mb-1">Timber Cost (100x)</label>
                        <input type="number" id="price-timber" value="180" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Tender Timber Cost (100x)</label>
                        <input type="number" id="price-tender" value="358" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Sturdy Timber Cost (100x)</label>
                        <input type="number" id="price-sturdy" value="1686" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Abidos Timber Cost (100x)</label>
                        <input type="number" id="price-abidos" value="2198" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 outline-none focus:border-blue-500">
                    </div>
                </div>

                <h2 class="text-xl font-semibold text-slate-300 mt-6">Wallet Settings</h2>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium mb-1">Gold Balance</label>
                        <input type="number" id="gold-balance" value="1400000" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Gold To Keep</label>
                        <input type="number" id="gold-keep" value="100000" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 outline-none focus:border-blue-500">
                    </div>
                </div>
                
                <button onclick="calculate()" class="w-full bg-blue-600 hover:bg-blue-500 transition-colors py-3 rounded-lg font-bold text-lg mt-4">
                    Calculate Max Craft
                </button>
            </section>

            <section id="results" class="bg-slate-900/50 rounded-lg p-6 border border-slate-700 hidden">
                <h2 class="text-xl font-semibold text-blue-300 mb-4">Optimal Strategy</h2>
                <div class="space-y-4">
                    <div class="text-4xl font-bold text-green-400" id="res-total-crafts">0</div>
                    <p class="text-sm text-slate-400">Total Serca Fusion Materials</p>
                    
                    <hr class="border-slate-700">
                    
                    <h3 class="font-medium text-slate-300">Purchase List (Stacks of 100):</h3>
                    <ul id="res-shopping-list" class="space-y-1 text-slate-200"></ul>
                    
                    <h3 class="font-medium text-slate-300 mt-4">Remaining Gold:</h3>
                    <div id="res-remaining-gold" class="text-lg font-mono text-yellow-500">0g</div>
                    <p class="text-xs text-slate-500 italic">*Includes flat crafting fees and AH purchases.</p>
                </div>
            </section>
        </div>
    </div>

    <script>
        function calculate() {
            const pTimber = parseFloat(document.getElementById('price-timber').value);
            const pTender = parseFloat(document.getElementById('price-tender').value);
            const pSturdy = parseFloat(document.getElementById('price-sturdy').value);
            const pAbidos = parseFloat(document.getElementById('price-abidos').value);
            
            const goldTotal = parseFloat(document.getElementById('gold-balance').value);
            const goldKeep = parseFloat(document.getElementById('gold-keep').value);
            const availableBudget = goldTotal - goldKeep;

            // Effective individual item costs from AH
            const unitCosts = {
                timber: pTimber / 100,
                tender: pTender / 100,
                sturdy: pSturdy / 100,
                abidos: pAbidos / 100
            };

            // Optimization: Find cheapest way to get 1 of each required item
            // 25 Tender -> 50 Timber (1 Tender = 2 Timber)
            // 5 Sturdy -> 50 Timber (1 Sturdy = 10 Timber)
            // 100 Powder -> 50 Tender | 10 Sturdy | 10 Abidos
            // We'll use a simplified comparison for the specific recipe needs:
            const bestCostTimber = Math.min(unitCosts.timber, (unitCosts.tender * 25/50), (unitCosts.sturdy * 5/50));
            const bestCostTender = Math.min(unitCosts.tender, (unitCosts.timber * 100/80 * 100/50)); // Timber -> Powder -> Tender
            const bestCostAbidos = Math.min(unitCosts.abidos, (unitCosts.timber * 100/80 * 100/10)); // Timber -> Powder -> Abidos

            // Cost per 10x Craft (Batch)
            // Requirements: 112 Timber, 59 Tender, 43 Abidos + 462g fee
            const materialCostPerBatch = (112 * bestCostTimber) + (59 * bestCostTender) + (43 * bestCostAbidos);
            const totalCostPerBatch = materialCostPerBatch + 462;

            const totalBatches = Math.floor(availableBudget / totalCostPerBatch);
            
            if (totalBatches <= 0) {
                alert("Insufficient gold for 1 craft.");
                return;
            }

            // Calculations for shopping list (round up to nearest 100 stack)
            const stackTimber = Math.ceil((totalBatches * 112) / 100);
            const stackTender = Math.ceil((totalBatches * 59) / 100);
            const stackAbidos = Math.ceil((totalBatches * 43) / 100);

            const totalSpentOnMats = (stackTimber * pTimber) + (stackTender * pTender) + (stackAbidos * pAbidos);
            const totalFees = totalBatches * 462;
            const finalGold = goldTotal - (totalSpentOnMats + totalFees);

            // Display
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('res-total-crafts').innerText = (totalBatches * 10).toLocaleString();
            document.getElementById('res-remaining-gold').innerText = finalGold.toLocaleString(undefined, {minimumFractionDigits: 2}) + "g";
            
            const list = document.getElementById('res-shopping-list');
            list.innerHTML = `
                <li><span class="text-blue-400 font-mono">${stackTimber}x</span> Timber Stacks</li>
                <li><span class="text-blue-400 font-mono">${stackTender}x</span> Tender Timber Stacks</li>
                <li><span class="text-blue-400 font-mono">0x</span> Sturdy Timber Stacks</li>
                <li><span class="text-blue-400 font-mono">${stackAbidos}x</span> Abidos Timber Stacks</li>
            `;
        }
    </script>
</body>
</html>
